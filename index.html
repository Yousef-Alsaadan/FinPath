<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />

    <!-- Primary metadata -->
    <title>FinPath — Personal Finance, Budgets & Goals</title>
    <meta name="description" content="FinPath helps you manage expenses, build personal budgets, track income and reach financial goals. Bilingual (Arabic/English), private, and offline-ready." />
    <meta name="application-name" content="FinPath" />
    <meta name="author" content="FinPath" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="keywords" content="personal finance, budgeting, expense tracker, savings goals, financial health, SAR, Saudi Arabia, ميزانية, إدارة مصروفات" />
    <link rel="canonical" href="https://finpath.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FinPath" />
    <meta property="og:title" content="FinPath — Personal Finance, Budgets & Goals" />
    <meta property="og:description" content="Manage expenses, budgets, income and financial goals. Bilingual, private, offline-ready." />
    <meta property="og:url" content="https://finpath.app/" />
    <meta property="og:image" content="https://finpath.app/logo.svg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FinPath — Personal Finance, Budgets & Goals" />
    <meta name="twitter:description" content="Manage expenses, budgets, income and financial goals. Bilingual, private, offline-ready." />
    <meta name="twitter:image" content="https://finpath.app/logo.svg" />

    <!-- Fonts: Manrope (English) + Tajawal (Arabic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: WebApplication / SoftwareApplication / Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": ["WebApplication", "SoftwareApplication"],
          "name": "FinPath",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Any",
          "description": "Personal finance app to manage expenses, budgets, income and goals with a custom financial-month cycle. Works offline and stores data privately on your device.",
          "url": "https://finpath.app/",
          "inLanguage": ["en", "ar"],
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "SAR" },
          "featureList": [
            "Expense tracking",
            "Budgeting with limits and alerts",
            "Income management",
            "Financial goals with progress tracking",
            "Recurring fixed expenses",
            "Custom financial-month reset cycle",
            "Spending and savings analytics",
            "Financial health score",
            "Offline support (PWA)"
          ]
        },
        {
          "@type": "Organization",
          "name": "FinPath",
          "url": "https://finpath.app/",
          "logo": "https://finpath.app/logo.svg"
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is a financial month in FinPath?",
              "acceptedAnswer": { "@type": "Answer", "text": "A financial month is your own budgeting cycle that begins on a day you choose — for example the 25th — instead of the calendar 1st. FinPath resets your current-month spending on that day and keeps past months as history." }
            },
            {
              "@type": "Question",
              "name": "Where is my financial data stored?",
              "acceptedAnswer": { "@type": "Answer", "text": "All data is stored locally in your browser. Nothing is sent to a server. You can export or import a JSON backup at any time from Settings." }
            },
            {
              "@type": "Question",
              "name": "How is the financial health score calculated?",
              "acceptedAnswer": { "@type": "Answer", "text": "The score combines your savings rate, budget adherence, spending stability and goal progress into a single value rated Poor, Fair, Good or Excellent." }
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>FinPath requires JavaScript to manage your budgets and expenses.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
